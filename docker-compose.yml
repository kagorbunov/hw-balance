services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: hw_balance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hw_balance"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ./db
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command: ["-dir", "/migrations", "postgres", "postgres://app:app@postgres:5432/hw_balance?sslmode=disable", "up"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/hw_balance?sslmode=disable
      AUTH_TOKEN: secret-token
      PORT: 8080
      LOG_LEVEL: info
    ports:
      - "18088:8080"
    restart: unless-stopped

volumes:
  postgres_data:
